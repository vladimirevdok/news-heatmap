<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World News Heatmap — Live</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#04091a;color:#e0e8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}

/* ── LOADING ── */
#loader{position:fixed;inset:0;z-index:9999;background:#04091a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .5s}
#loader.out{opacity:0;pointer-events:none}
.spin{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,100,20,.12);border-top-color:#ff6414;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader-msg{font-size:12px;color:#3a5070;letter-spacing:.06em}

/* ── HEADER ── */
#hdr{flex-shrink:0;height:46px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;background:#050c1c;border-bottom:1px solid rgba(255,255,255,.055);z-index:10}
#hdr h1{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#7a9bbf}
#hdr-right{display:flex;align-items:center;gap:18px;font-size:11px;color:#2d4560}
#feed-pills{display:flex;gap:6px}
.feed-pill{font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 7px;border-radius:20px;border:1px solid;transition:all .3s}
.feed-pill.ok{border-color:rgba(40,200,100,.3);color:#28c864;background:rgba(40,200,100,.07)}
.feed-pill.fail{border-color:rgba(255,60,60,.25);color:#ff4444;background:rgba(255,60,60,.06);text-decoration:line-through;opacity:.5}
.feed-pill.wait{border-color:rgba(255,160,40,.25);color:#ffa028;background:rgba(255,160,40,.06)}
#stat-articles{color:#4a6880}
#stat-updated{color:#2d4560}
#live-dot-wrap{display:flex;align-items:center;gap:5px;color:#ff3333;font-weight:700;font-size:10px;letter-spacing:.14em}
.ldot{width:6px;height:6px;background:#ff3333;border-radius:50%;animation:ldot 1.4s ease infinite}
@keyframes ldot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.55)}}
#refresh-ring{width:16px;height:16px;position:relative;flex-shrink:0}
#refresh-ring svg{width:16px;height:16px;transform:rotate(-90deg)}
#refresh-arc{stroke:#ff6414;stroke-width:2;fill:none;stroke-linecap:round;stroke-dasharray:44;stroke-dashoffset:44;transition:stroke-dashoffset 1s linear}

/* ── MAP ── */
#map-wrap{position:relative;flex:1;min-height:0;overflow:hidden;background:#040913}
#world-svg{position:absolute;top:0;left:0;display:block;cursor:grab}
#world-svg:active{cursor:grabbing}
#zoom-hint{display:flex;gap:5px;align-items:center}
.zoom-btn{width:24px;height:24px;background:rgba(4,9,26,.85);border:1px solid rgba(255,255,255,.09);border-radius:5px;color:#6688aa;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;backdrop-filter:blur(8px);user-select:none}
.zoom-btn:hover{background:rgba(255,100,40,.15);border-color:rgba(255,100,40,.3);color:#ff8844}
#heat-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:2;transition:opacity .4s}
#heat-canvas.fading{opacity:.4}

/* ── TOOLTIP ── */
#tip{position:absolute;z-index:40;background:rgba(4,9,26,.96);border:1px solid rgba(255,100,40,.35);border-radius:8px;padding:0;pointer-events:none;max-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.7);backdrop-filter:blur(14px);overflow:hidden;transition:opacity .15s}
#tip.hidden{display:none}
#tip-head{padding:10px 13px 8px;border-bottom:1px solid rgba(255,255,255,.07)}
#tip-country{font-weight:700;font-size:13px;color:#ddeeff;margin-bottom:2px}
#tip-meta{font-size:10px;color:#445566;display:flex;gap:10px}
.tip-stat{display:flex;align-items:center;gap:4px}
.tip-heat-val{color:#ff9944}
#tip-headlines{padding:8px 0 4px;max-height:140px;overflow:hidden}
.tip-hl{padding:4px 13px;font-size:11px;color:#7799bb;line-height:1.45;border-left:2px solid transparent;transition:border-color .15s}
.tip-hl:hover{border-left-color:#ff6414;color:#99bbdd;cursor:pointer}
.tip-hl-src{font-size:9px;color:#ff7733;font-weight:700;margin-right:5px;letter-spacing:.04em}
#tip-click-hint{padding:5px 13px 9px;font-size:10px;color:#2d4560;font-style:italic}

/* ── SIDE PANEL ── */
#panel{position:absolute;top:0;right:0;width:320px;height:100%;background:rgba(4,9,26,.97);border-left:1px solid rgba(255,255,255,.07);z-index:30;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.25,.46,.45,.94);backdrop-filter:blur(20px)}
#panel.open{transform:translateX(0)}
#panel-hdr{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-shrink:0}
#panel-country{font-weight:700;font-size:16px;color:#ddeeff}
#panel-count{font-size:11px;color:#ff9944;margin-top:3px}
#panel-close{background:none;border:none;color:#334455;font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;transition:color .15s}
#panel-close:hover{color:#aabbcc}
#panel-body{flex:1;overflow-y:auto;padding:8px 0}
#panel-body::-webkit-scrollbar{width:4px}
#panel-body::-webkit-scrollbar-track{background:transparent}
#panel-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.panel-item{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s}
.panel-item:hover{background:rgba(255,255,255,.04)}
.panel-item-src{font-size:9px;font-weight:700;color:#ff7733;letter-spacing:.06em;margin-bottom:4px}
.panel-item-title{font-size:12px;color:#99bbcc;line-height:1.5}
.panel-item-date{font-size:10px;color:#2d4560;margin-top:3px}
#panel-empty{padding:20px 16px;font-size:12px;color:#2d4560;font-style:italic}

/* ── COUNTRY LABELS ── */
.cty-label{pointer-events:none;font-size:9px;font-weight:700;fill:#ff9944;letter-spacing:.06em;text-anchor:middle;dominant-baseline:middle;opacity:0;transition:opacity .4s}

/* ── TREND BADGES ── */
.trend-badge{pointer-events:none}

/* ── LEGEND + ZOOM — stacked bottom-right ── */
#map-controls{position:absolute;bottom:10px;right:14px;z-index:21;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
#legend{display:flex;align-items:center;gap:8px;background:rgba(4,9,26,.85);border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:6px 12px;font-size:10px;color:#334455;backdrop-filter:blur(8px)}
#legend-bar{width:70px;height:5px;border-radius:3px;background:linear-gradient(to right,#ffee00,#ff8800,#ff2200)}
#legend span{font-size:9px;letter-spacing:.04em}

/* ── TICKER ── */
#ticker{flex-shrink:0;height:30px;display:flex;align-items:center;background:#050c1c;border-top:1px solid rgba(255,255,255,.05);overflow:hidden;z-index:10}
.tlabel{flex-shrink:0;padding:0 12px;font-size:9px;font-weight:700;color:#ff3333;letter-spacing:.14em;border-right:1px solid rgba(255,255,255,.05);height:100%;display:flex;align-items:center}
#t-track{flex:1;overflow:hidden;height:100%;position:relative}
#t-inner{display:inline-flex;align-items:center;height:100%;white-space:nowrap;will-change:transform}
.ti{display:inline-flex;align-items:center;gap:5px;padding:0 18px;font-size:10px;color:#4a6880;cursor:pointer;transition:color .15s}
.ti:hover{color:#88aacc}
.ti-src{color:#ff7733;font-size:9px;font-weight:700;letter-spacing:.04em;flex-shrink:0}
.tdot{display:inline-block;width:3px;height:3px;background:rgba(255,100,40,.45);border-radius:50%;flex-shrink:0;margin:0 2px}
@keyframes countUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.count-anim{animation:countUp .3s ease}

/* ── MARKETS BAR ── */
#markets{flex-shrink:0;height:34px;display:flex;align-items:center;gap:0;background:#040b18;border-bottom:1px solid rgba(255,255,255,.05);overflow:hidden;z-index:9;padding:0 6px}
.mkt{display:flex;align-items:center;gap:6px;padding:0 12px;border-right:1px solid rgba(255,255,255,.05);flex-shrink:0;cursor:default}
.mkt:last-child{border-right:none}
.mkt-sym{font-size:9px;font-weight:700;letter-spacing:.08em;color:#445566;text-transform:uppercase}
.mkt-price{font-size:11px;font-weight:600;color:#b8ccd8;font-variant-numeric:tabular-nums;min-width:62px;text-align:right}
.mkt-chg{font-size:9px;font-weight:700;min-width:46px;text-align:right;font-variant-numeric:tabular-nums}
.mkt-chg.up{color:#22cc77}
.mkt-chg.dn{color:#ff4444}
.mkt-chg.flat{color:#445566}
.mkt-loading{color:#2d4560;font-size:10px;font-style:italic;padding:0 12px}
#mkt-updated{font-size:9px;color:#1e3040;margin-left:auto;padding-right:10px;flex-shrink:0;white-space:nowrap}

/* ── UK POI MARKERS ── */
.uk-poi{cursor:pointer;transition:opacity .3s}
.uk-poi-tip{position:absolute;z-index:50;background:rgba(4,9,26,.97);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:6px 10px;pointer-events:none;white-space:nowrap;font-size:11px;color:#ccddeeff;box-shadow:0 4px 20px rgba(0,0,0,.7);backdrop-filter:blur(12px)}
.uk-poi-tip-type{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}

/* ── ALLIANCE BUTTONS ── */
#alliance-btns{position:absolute;top:10px;left:14px;z-index:21;display:flex;flex-direction:column;gap:5px}
.alliance-btn{padding:5px 11px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:6px;border:1px solid;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;user-select:none;white-space:nowrap}
.alliance-btn.nato{color:#4488ff;border-color:rgba(68,136,255,.3);background:rgba(68,136,255,.08)}
.alliance-btn.nato:hover,.alliance-btn.nato.active{background:rgba(68,136,255,.22);border-color:rgba(68,136,255,.7);box-shadow:0 0 10px rgba(68,136,255,.25)}
.alliance-btn.brics{color:#44cc77;border-color:rgba(68,204,119,.3);background:rgba(68,204,119,.08)}
.alliance-btn.brics:hover,.alliance-btn.brics.active{background:rgba(68,204,119,.22);border-color:rgba(68,204,119,.7);box-shadow:0 0 10px rgba(68,204,119,.25)}
.alliance-btn.sco{color:#cc88ff;border-color:rgba(204,136,255,.3);background:rgba(204,136,255,.08)}
.alliance-btn.sco:hover,.alliance-btn.sco.active{background:rgba(204,136,255,.22);border-color:rgba(204,136,255,.7);box-shadow:0 0 10px rgba(204,136,255,.25)}
.alliance-btn.g7{color:#ffcc44;border-color:rgba(255,204,68,.3);background:rgba(255,204,68,.08)}
.alliance-btn.g7:hover,.alliance-btn.g7.active{background:rgba(255,204,68,.22);border-color:rgba(255,204,68,.7);box-shadow:0 0 10px rgba(255,204,68,.25)}

/* ── CONFLICTS BUTTON + DROPDOWN ── */
#conflicts-wrap{position:absolute;top:10px;right:14px;z-index:22}
#conflicts-btn{background:rgba(4,9,26,.9);border:1px solid rgba(255,60,60,.35);border-radius:7px;padding:5px 12px;font-size:10px;font-weight:700;color:#ff4444;letter-spacing:.08em;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;user-select:none;display:flex;align-items:center;gap:6px;white-space:nowrap}
#conflicts-btn:hover{background:rgba(255,40,40,.15);border-color:rgba(255,60,60,.7)}
#conflicts-btn .cbulse{width:6px;height:6px;border-radius:50%;background:#ff3333;animation:ldot 1.1s ease infinite;flex-shrink:0}
#conflicts-dropdown{position:absolute;top:calc(100% + 6px);right:0;width:240px;background:rgba(4,9,26,.98);border:1px solid rgba(255,60,60,.2);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.8);backdrop-filter:blur(20px);display:none;flex-direction:column;max-height:340px;overflow-y:auto;z-index:23}
#conflicts-dropdown.open{display:flex}
#conflicts-dropdown::-webkit-scrollbar{width:3px}
#conflicts-dropdown::-webkit-scrollbar-thumb{background:rgba(255,60,60,.2);border-radius:2px}
.cf-item{padding:9px 13px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:9px;flex-shrink:0}
.cf-item:hover{background:rgba(255,40,40,.08)}
.cf-item:last-child{border-bottom:none}
.cf-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cf-name{font-size:11px;font-weight:700;color:#ddcccc;flex:1}
.cf-heat{font-size:9px;color:#ff6644;font-weight:700;white-space:nowrap}
.cf-new{font-size:8px;font-weight:700;color:#ff3333;background:rgba(255,40,40,.15);border:1px solid rgba(255,40,40,.3);border-radius:3px;padding:1px 4px;margin-left:4px;animation:pulse-new 1s ease infinite}
@keyframes pulse-new{0%,100%{opacity:1}50%{opacity:.4}}

/* ── CONFLICT DETAIL PANEL ── */
#conflict-panel{position:absolute;top:0;right:0;width:340px;height:100%;background:rgba(3,7,20,.98);border-left:1px solid rgba(255,60,60,.15);z-index:35;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .38s cubic-bezier(.25,.46,.45,.94);backdrop-filter:blur(24px)}
#conflict-panel.open{transform:translateX(0)}
#cp-hdr{padding:14px 16px 12px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-shrink:0}
#cp-title{font-size:14px;font-weight:700;color:#ffcccc;line-height:1.3}
#cp-close{background:none;border:none;color:#334455;font-size:18px;cursor:pointer;padding:0;line-height:1;transition:color .15s;flex-shrink:0}
#cp-close:hover{color:#aabbcc}
#cp-meta{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0}
.cp-badge{font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:10px;text-transform:uppercase}
.cp-badge.active{background:rgba(255,40,40,.15);color:#ff5555;border:1px solid rgba(255,40,40,.25)}
.cp-badge.frozen{background:rgba(100,140,255,.1);color:#88aaff;border:1px solid rgba(100,140,255,.2)}
.cp-badge.tension{background:rgba(255,160,40,.1);color:#ffaa44;border:1px solid rgba(255,160,40,.2)}
#cp-countries{padding:8px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0}
.cp-country-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;border:1px solid rgba(255,80,80,.25);color:#ffaaaa;background:rgba(255,40,40,.07);cursor:pointer;transition:all .15s}
.cp-country-tag:hover{background:rgba(255,40,40,.18);border-color:rgba(255,80,80,.6)}
#cp-body{flex:1;overflow-y:auto;padding:0}
#cp-body::-webkit-scrollbar{width:3px}
#cp-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
#cp-history{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
#cp-history-title{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#664444;margin-bottom:8px}
#cp-history-text{font-size:11px;color:#7a8899;line-height:1.65}
#cp-live{padding:10px 0 6px}
#cp-live-title{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#664444;padding:0 16px;margin-bottom:6px}
.cp-article{padding:7px 16px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .12s}
.cp-article:hover{background:rgba(255,255,255,.03)}
.cp-article-src{font-size:9px;font-weight:700;color:#ff6644;letter-spacing:.04em;margin-bottom:2px}
.cp-article-title{font-size:11px;color:#7799bb;line-height:1.45}
.cp-article-ago{font-size:9px;color:#2d4560;margin-top:2px}
#cp-live-empty{padding:8px 16px;font-size:11px;color:#2d4560;font-style:italic}
#cp-footer{padding:10px 16px;border-top:1px solid rgba(255,255,255,.05);font-size:9px;color:#2d4560;flex-shrink:0;font-style:italic}

/* ── ISSUES PANEL ── */
#issues-btn{position:absolute;top:42px;right:14px;z-index:21;background:rgba(4,9,26,.9);border:1px solid rgba(255,160,40,.25);border-radius:7px;padding:5px 12px;font-size:10px;font-weight:700;color:#ffa030;letter-spacing:.08em;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;user-select:none}
#issues-btn:hover{background:rgba(255,120,20,.15);border-color:rgba(255,120,20,.5)}
#issues-panel{position:absolute;top:0;left:0;width:300px;height:100%;background:rgba(4,9,26,.97);border-right:1px solid rgba(255,255,255,.07);z-index:30;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .35s cubic-bezier(.25,.46,.45,.94);backdrop-filter:blur(20px)}
#issues-panel.open{transform:translateX(0)}
#issues-hdr{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#issues-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#ffa030}
#issues-close{background:none;border:none;color:#334455;font-size:18px;cursor:pointer;padding:0;line-height:1;transition:color .15s}
#issues-close:hover{color:#aabbcc}
#issues-body{flex:1;overflow-y:auto;padding:8px 0}
#issues-body::-webkit-scrollbar{width:4px}
#issues-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.issue-item{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s}
.issue-item:hover{background:rgba(255,255,255,.04)}
.issue-tag{display:inline-block;font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:10px;margin-bottom:5px}
.issue-tag.war{background:rgba(255,40,40,.15);color:#ff5555;border:1px solid rgba(255,40,40,.2)}
.issue-tag.politics{background:rgba(80,140,255,.12);color:#6699ff;border:1px solid rgba(80,140,255,.18)}
.issue-tag.economy{background:rgba(40,200,120,.1);color:#44cc88;border:1px solid rgba(40,200,120,.18)}
.issue-tag.diplomacy{background:rgba(160,80,255,.12);color:#bb88ff;border:1px solid rgba(160,80,255,.18)}
.issue-tag.security{background:rgba(255,160,40,.1);color:#ffaa44;border:1px solid rgba(255,160,40,.18)}
.issue-name{font-size:12px;font-weight:700;color:#ccddeeff;margin-bottom:3px}
.issue-count{font-size:10px;color:#ff9944;margin-bottom:4px}
.issue-countries{font-size:10px;color:#445566;line-height:1.5}
.issue-dot{display:inline-block;width:6px;height:6px;border-radius:50%;vertical-align:middle;margin-right:3px}

/* ── DOOMSDAY CLOCK ── */
#doom{position:absolute;bottom:44px;left:14px;z-index:20;width:96px;cursor:default;user-select:none}
#doom-face{width:96px;height:96px;display:block;filter:drop-shadow(0 0 10px rgba(255,30,10,.35))}
#doom-label{text-align:center;margin-top:5px;font-size:8px;font-weight:700;letter-spacing:.1em;color:#7a2010;text-transform:uppercase}
#doom-time{text-align:center;font-size:11px;font-weight:700;color:#cc3311;letter-spacing:.04em;margin-top:1px;font-variant-numeric:tabular-nums}
#doom-sub{text-align:center;font-size:7.5px;color:#4a1508;letter-spacing:.04em;margin-top:2px;line-height:1.4}
</style>
<style id="ts"></style>
</head>
<body>

<div id="loader"><div class="spin"></div><p id="loader-msg">Loading world map…</p></div>

<header id="hdr">
  <h1>World News Heatmap</h1>
  <div id="hdr-right">
    <div id="feed-pills"></div>
    <span id="stat-articles">— articles</span>
    <span id="stat-updated">—</span>
    <div id="refresh-ring">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" id="refresh-arc"/></svg>
    </div>
    <div id="live-dot-wrap"><span class="ldot"></span>LIVE</div>
  </div>
</header>

<!-- MARKETS BAR -->
<div id="markets">
  <span class="mkt-loading" id="mkt-loading">Loading markets…</span>
  <span id="mkt-updated"></span>
</div>

<div id="map-wrap">
  <svg id="world-svg"></svg>
  <canvas id="heat-canvas"></canvas>
  <div id="tip" class="hidden"></div>
  <div id="uk-poi-tip" class="uk-poi-tip" style="display:none"></div>
  <div id="map-controls">
    <div id="zoom-hint">
      <div class="zoom-btn" id="zoom-in" title="Zoom in">+</div>
      <div class="zoom-btn" id="zoom-out" title="Zoom out">−</div>
      <div class="zoom-btn" id="zoom-reset" title="Reset zoom" style="font-size:11px">⌂</div>
    </div>

var RE={};
function mkre(kw){
  if(!RE[kw]) RE[kw]=new RegExp('(?:^|[\\s,;:(\\["\'])'+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?=$|[\\s,;:.!?\\])"\'\\-])','i');
  return RE[kw];
}

/* ═══════════════════════════════════════════════
   MAP INIT
═══════════════════════════════════════════════ */
function initMap(){
  return new Promise(function(res,rej){
    requestAnimationFrame(function(){
      var wrap = document.getElementById('map-wrap');
      S.W = wrap.clientWidth||window.innerWidth;
      S.H = wrap.clientHeight||(window.innerHeight-46-30);

      S.svg = d3.select('#world-svg').attr('width',S.W).attr('height',S.H);
      S.canvas = document.getElementById('heat-canvas');
      S.canvas.width=S.W; S.canvas.height=S.H;
      S.ctx = S.canvas.getContext('2d');

      S.proj = d3.geoNaturalEarth1()
        .scale(S.W/6.3)
        .translate([S.W/2, S.H/2]);
      S.path = d3.geoPath().projection(S.proj);

      d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
        .then(function(topo){
          var countries = topojson.feature(topo,topo.objects.countries);
          var borders   = topojson.mesh(topo,topo.objects.countries,function(a,b){return a!==b});
          var sphere    = {type:'Sphere'};

          // Ocean with subtle radial gradient
          var defs = S.svg.append('defs');
          var rg = defs.append('radialGradient').attr('id','ocean-grad')
            .attr('cx','50%').attr('cy','45%').attr('r','60%');
          rg.append('stop').attr('offset','0%').attr('stop-color','#071828');
          rg.append('stop').attr('offset','100%').attr('stop-color','#030810');

          // All geo layers go inside mapG so zoom transform applies to them
          S.mapG = S.svg.append('g').attr('class','map-g');

          S.mapG.append('path').datum(sphere)
            .attr('d',S.path).attr('fill','url(#ocean-grad)');

          // Graticule
          S.mapG.append('path').datum(d3.geoGraticule()())
            .attr('d',S.path).attr('fill','none')
            .attr('stroke','rgba(255,255,255,0.028)').attr('stroke-width',.4);

          // Country fills
          var cg = S.mapG.append('g').attr('class','countries');
          cg.selectAll('path').data(countries.features).join('path')
            .attr('d',S.path)
            .attr('fill','#182d48')
            .attr('stroke','none')
            .attr('class','cty')
            .on('mousemove', onHover)
            .on('mouseleave', function(){ hideTip(); })
            .on('click', onClick);

          // Country borders
          S.mapG.append('path').datum(borders).attr('d',S.path)
            .attr('fill','none').attr('stroke','#0d1e32').attr('stroke-width',.6);

          // Sphere outline
          S.mapG.append('path').datum(sphere).attr('d',S.path)
            .attr('fill','none').attr('stroke','rgba(255,255,255,.06)').attr('stroke-width',.8);

          // Label group OUTSIDE mapG — positions computed in screen space
          S.labelG = S.svg.append('g').attr('class','labels').style('pointer-events','none');
          // POI group — on top of labels, pointer-events enabled
          S.poiG = S.svg.append('g').attr('class','poi-layer');

          // ── ZOOM ──
          S.zoomK = 1; S.zoomX = 0; S.zoomY = 0;
          S.zoom = d3.zoom()
            .scaleExtent([1, 12])
            .on('zoom', function(event){
              var t = event.transform;
              S.zoomK = t.k; S.zoomX = t.x; S.zoomY = t.y;
              // Move the SVG geo layers only (not labels — those we recompute)
              S.mapG.attr('transform', 'translate('+t.x+','+t.y+') scale('+t.k+')');
              // Re-render heatmap canvas and labels at new transform
              if(S.heatPts.length) renderHeat(S.heatPts);
              renderLabels(S.heatPts);
              renderUKPoi();
            });

          S.svg.call(S.zoom);

          // Double-click resets zoom
          S.svg.on('dblclick.zoom', function(){
            S.svg.transition().duration(500).call(S.zoom.transform, d3.zoomIdentity);
          });

          // Button controls
          document.getElementById('zoom-in').addEventListener('click', function(){
            S.svg.transition().duration(300).call(S.zoom.scaleBy, 2);
          });
          document.getElementById('zoom-out').addEventListener('click', function(){
            S.svg.transition().duration(300).call(S.zoom.scaleBy, 0.5);
          });
          document.getElementById('zoom-reset').addEventListener('click', function(){
            S.svg.transition().duration(500).call(S.zoom.transform, d3.zoomIdentity);
          });

          window.addEventListener('resize', debounce(handleResize,200));
          res();
        })
        .catch(function(e){
          document.getElementById('map-wrap').innerHTML='<p style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff5555;font-size:14px;text-align:center">Could not load world map.<br>Check internet connection.</p>';
          rej(e);
        });
    });
  });
}

/* ═══════════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════════ */
function handleResize(){
  var wrap=document.getElementById('map-wrap');
  S.W=wrap.clientWidth; S.H=wrap.clientHeight;
  S.svg.attr('width',S.W).attr('height',S.H);
  S.canvas.width=S.W; S.canvas.height=S.H;
  S.proj.scale(S.W/6.3).translate([S.W/2,S.H/2]);
  // Reset zoom on resize
  S.zoomK=1; S.zoomX=0; S.zoomY=0;
  if(S.zoom) S.svg.call(S.zoom.transform, d3.zoomIdentity);
  S.mapG && S.mapG.selectAll('path').attr('d',S.path);
  if(S.heatPts.length) renderHeat(S.heatPts);
  renderLabels(S.heatPts);
  renderUKPoi();
}

/* ═══════════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════════ */
function findNearestHot(mouseX, mouseY){
  // Find nearest hotspot by screen-pixel distance (not lat/lng),
  // so hovering anywhere near a blob shows the right country.
  var best=null, bd=Infinity;
  var SNAP_PX = 120; // max pixel radius to snap
  S.heatPts.forEach(function(p){
    var px=S.proj([p.lng,p.lat]);
    if(!px||!isFinite(px[0])) return;
    var d=Math.hypot(mouseX-px[0], mouseY-px[1]);
    if(d<bd && d<SNAP_PX){bd=d;best=p;}
  });
  return best;
}

function onHover(evt,d){
  var r=document.getElementById('map-wrap').getBoundingClientRect();
  var mouseX=evt.clientX-r.left, mouseY=evt.clientY-r.top;
  var pt=findNearestHot(mouseX, mouseY);
  if(!pt){hideTip();return;}
  var arts=(S.byCountry[pt.name]||[]).slice(0,4);
  var x=mouseX+16, y=mouseY-10;
  if(x+250>S.W) x=evt.clientX-r.left-260;
  if(y+200>S.H) y=evt.clientY-r.top-200;

  var hlHtml=arts.map(function(a){
    return '<div class="tip-hl" onclick="openPanel(\''+escAttr(pt.name)+'\')">'
      +'<span class="tip-hl-src">'+esc(a.source)+'</span>'+esc(trunc(a.title,70))+'</div>';
  }).join('');

  document.getElementById('tip').innerHTML=
    '<div id="tip-head">'
      +'<div id="tip-country">'+esc(pt.name)+'</div>'
      +'<div id="tip-meta">'
        +'<span class="tip-stat"><span class="tip-heat-val">'+pt.count+'</span> articles</span>'
        +'<span class="tip-stat">Heat <span class="tip-heat-val">'+Math.round(pt.score*100)+'%</span></span>'
        +(pt.trend!==0?'<span class="tip-stat" style="color:'+(pt.trend>0?'#ff6644':'#44cc88')+'">'+(pt.trend>0?'▲':'▼')+Math.abs(pt.trend)+'</span>':'')
      +'</div>'
    +'</div>'
    +'<div id="tip-headlines">'+hlHtml+'</div>'
    +(arts.length?'<div id="tip-click-hint">Click country to see all headlines</div>':'');

  var tip=document.getElementById('tip');
  tip.style.left=x+'px'; tip.style.top=y+'px';
  tip.classList.remove('hidden');
}

function hideTip(){document.getElementById('tip').classList.add('hidden');}

function onClick(evt,d){
  var r=document.getElementById('map-wrap').getBoundingClientRect();
  var mouseX=evt.clientX-r.left, mouseY=evt.clientY-r.top;
  var pt=findNearestHot(mouseX, mouseY);
  if(!pt) return;
  openPanel(pt.name);
}

window.openPanel=function(name){
  S.openCountry=name;
  var arts=S.byCountry[name]||[];
  document.getElementById('panel-country').textContent=name;
  document.getElementById('panel-count').textContent=arts.length+' article'+(arts.length!==1?'s':'')+' in this cycle';

      return '<div class="panel-item" onclick="window.open(\''+escAttr(a.link)+'\',\'_blank\')">'
        +'<div class="panel-item-src">'+esc(a.source)+'</div>'
        +'<div class="panel-item-title">'+esc(a.title)+'</div>'
        +'<div class="panel-item-date">'+ago+'</div>'
        +'</div>';
    }).join('');
  }
  document.getElementById('panel').classList.add('open');

};

// Minimum zoom level before POIs appear (k >= this value)
var POI_ZOOM_THRESHOLD = 4;

function renderUKPoi(){
  if(!S.poiG) return;
  S.poiG.selectAll('*').remove();

  var k = S.zoomK || 1;
  if(k < POI_ZOOM_THRESHOLD){ return; }

  // Check if UK is actually in viewport — use London as proxy
  var londonPx = S.proj([-0.12, 51.5]);
  if(!londonPx) return;
  var sx = londonPx[0]*k + (S.zoomX||0);
  var sy = londonPx[1]*k + (S.zoomY||0);
  // If London screen pos is way outside viewport, skip
  if(sx < -S.W*0.5 || sx > S.W*1.5 || sy < -S.H*0.5 || sy > S.H*1.5) return;

  // Fade in: opacity scales from 0 at threshold to 1 at threshold+2
  var opacity = Math.min(1, (k - POI_ZOOM_THRESHOLD) / 2);

  UK_POI.forEach(function(poi){
    var raw = S.proj([poi.lng, poi.lat]);
    if(!raw || !isFinite(raw[0])) return;
    var px = raw[0]*k + (S.zoomX||0);
    var py = raw[1]*k + (S.zoomY||0);
    // Skip if off-screen
    if(px < -20 || px > S.W+20 || py < -20 || py > S.H+20) return;

    var st = POI_STYLE[poi.type] || POI_STYLE.army;
    var r = 5;

    // Outer glow ring
    S.poiG.append('circle')
      .attr('cx', px).attr('cy', py).attr('r', r+3)
      .attr('fill', 'none')
      .attr('stroke', st.color)
      .attr('stroke-width', 1)
      .attr('opacity', opacity * 0.35)
      .attr('class','uk-poi');

    // Main dot
    S.poiG.append('circle')
      .attr('cx', px).attr('cy', py).attr('r', r)
      .attr('fill', st.color)
      .attr('stroke', st.stroke)
      .attr('stroke-width', 1.2)
      .attr('opacity', opacity)
      .attr('class','uk-poi')
      .attr('data-name', poi.name)
      .attr('data-type', poi.type)
      .attr('data-px', px)
      .attr('data-py', py)
      .style('pointer-events','all')
      .on('mouseenter', function(){
        var el = document.getElementById('uk-poi-tip');
        var typeSt = POI_STYLE[poi.type];
        el.innerHTML = '<div class="uk-poi-tip-type" style="color:'+typeSt.color+'">'+poi.type.toUpperCase()+'</div>'
          + '<div>' + poi.name + '</div>';
        var bx = px + 10, by = py - 10;
        if(bx + 200 > S.W) bx = px - 210;
        if(by < 10) by = py + 14;
        el.style.left = bx + 'px';
        el.style.top  = by + 'px';
        el.style.display = 'block';
      })
      .on('mouseleave', function(){
        document.getElementById('uk-poi-tip').style.display = 'none';
      });

    // Label text (only if zoom is high enough to avoid clutter)
    if(k >= 6){
      // Outline
      S.poiG.append('text')
        .attr('x', px).attr('y', py - r - 3)
        .attr('text-anchor','middle')
        .attr('font-size', 8)
        .attr('font-weight','700')
        .attr('font-family','Segoe UI,system-ui,sans-serif')
        .attr('fill','none')
        .attr('stroke','rgba(0,0,0,0.95)')
        .attr('stroke-width', 2.5)
        .attr('stroke-linejoin','round')
        .attr('opacity', opacity)
        .text(poi.name);
      // Foreground
      S.poiG.append('text')
        .attr('x', px).attr('y', py - r - 3)
        .attr('text-anchor','middle')
        .attr('font-size', 8)
        .attr('font-weight','700')
        .attr('font-family','Segoe UI,system-ui,sans-serif')
        .attr('fill', st.color)
        .attr('opacity', opacity)
        .text(poi.name);
    }
  });
}

function fetchAll(){
  FEEDS.forEach(function(f){ setFeedStatus(f.id,'wait'); });
  var ctrl=new AbortController();
  var t=setTimeout(function(){ctrl.abort();},15000);
  return fetch(API_URL,{signal:ctrl.signal})
    .then(function(r){
      clearTimeout(t);
      if(!r.ok) throw new Error('Server returned '+r.status);
      return r.json();
    })
    .then(function(d){
      var fs=d.feedStatus||{};
      FEEDS.forEach(function(f){ setFeedStatus(f.id, fs[f.id]||'ok'); });
      var articles=(d.articles||[]).map(function(a){
        return {
          title: a.title||'',
          desc:  a.desc||'',
          link:  a.link||'',
          source:a.source||'',
          date:  new Date(a.pubDate||Date.now()),
        };
      });
      articles.sort(function(a,b){ return b.date-a.date; });
      return articles;
    })
    .catch(function(e){
      clearTimeout(t);
      FEEDS.forEach(function(f){ setFeedStatus(f.id,'fail'); });
      console.warn('[fetchAll]',e.message);
      return [];
    });
}

var POL_RE = /\b(government|president|prime minister|minister|parliament|congress|senate|election|vote|policy|sanctions|military|troops|war|conflict|ceasefire|treaty|diplomat|diplomacy|foreign|nato|un |united nations|protest|coup|crisis|refugee|immigration|border|nuclear|missile|strike|attack|invasion|occupation|summit|bilateral|tariff|trade|economy|gdp|inflation|recession|central bank|federal reserve|debt|budget|deficit|oil|gas|energy|sanction|embargo|ally|alliance|security|intelligence|spy|espionage|arrest|trial|court|law|legislation|constitution|coup|terrorist|terrorism|insurgent|rebel|militia|ceasefire|peace|negotiat|accord|deal|agreement|geopolit|strategic|sovereignty|territory|annexation|blockade|siege|offensive|counteroffensive|airstrike|drone|weapon|arms|defense|forces|battalion|soldier|casualt|killed|dead|wounded|prisoner|captive|general|admiral|minister|chancellor|tsar|emperor|premier|secretary of state|foreign secretary|defense secretary|treasury|white house|kremlin|10 downing|elysee|bundestag|parliament)\b/i;

function isPolitical(article) {
  var txt = (article.title + ' ' + (article.desc || '')).toLowerCase();
  return POL_RE.test(txt);
}

/* ═══════════════════════════════════════════════
   EXTRACTION + NORMALIZATION
═══════════════════════════════════════════════ */
function extract(articles){
  var map={};
  var byC={};
  // filter to politics/economics only
  var filtered = articles.filter(isPolitical);
  filtered.forEach(function(a){
    var txt=(a.title+' '+a.title+' '+(a.desc||'')).toLowerCase().replace(/[^\w\s]/g,' ');
    var seen={};
    KW.forEach(function(kw){
      if(mkre(kw).test(txt)){
        var coord=C[kw]; var n=coord.name;
        if(!seen[n]){
          seen[n]=1;
          if(!map[n]) map[n]={lat:coord.lat,lng:coord.lng,name:n,count:0};
          map[n].count++;
          if(!byC[n]) byC[n]=[];
          if(byC[n].indexOf(a)<0) byC[n].push(a);
        }
      }
    });
  });
  S.byCountry=byC;
  // also store filtered for issues panel
  S.filteredArticles=filtered;
  return Object.values(map);
}

function normalize(pts){
  if(!pts.length) return [];
  var max=0;
  pts.forEach(function(p){if(p.count>max)max=p.count;});
  return pts.map(function(p){
    var prev=S.prevCounts[p.name]||0;
    return Object.assign({},p,{
      score:p.count/max,
      trend:p.count-prev,
    });
  });
}

/* ═══════════════════════════════════════════════
   HEATMAP RENDER  (two-pass: alpha map then colorize)
═══════════════════════════════════════════════ */
function lerpColor(t){
  var stops=[[0,[255,238,0]],[0.45,[255,120,0]],[1,[255,22,0]]];
  var lo=stops[0],hi=stops[2];
  for(var i=0;i<stops.length-1;i++){
    if(t>=stops[i][0]&&t<=stops[i+1][0]){lo=stops[i];hi=stops[i+1];break;}
  }
  var s=(hi[0]-lo[0])===0?0:(t-lo[0])/(hi[0]-lo[0]);
  return [
    ~~(lo[1][0]+s*(hi[1][0]-lo[1][0])),
    ~~(lo[1][1]+s*(hi[1][1]-lo[1][1])),
    ~~(lo[1][2]+s*(hi[1][2]-lo[1][2])),
  ];
}

function renderHeat(pts){
  var ctx=S.ctx;
  var W=S.W, H=S.H;
  var k=S.zoomK||1, tx=S.zoomX||0, ty=S.zoomY||0;

  // --- Pass 1: draw alpha blobs onto offscreen canvas ---
  var off=document.createElement('canvas');
  off.width=W; off.height=H;
  var octx=off.getContext('2d');
  octx.clearRect(0,0,W,H);

  pts.forEach(function(pt){
    var px=S.proj([pt.lng,pt.lat]);
    if(!px||!isFinite(px[0])) return;
    // Apply zoom transform to pixel position
    var sx = px[0]*k + tx;
    var sy = px[1]*k + ty;
    // Base radius scales with zoom but caps so blobs shrink relative to map at high zoom
    var baseR = 28 + pt.score * 100;
    var r = baseR * Math.pow(k, 0.45); // grow slower than zoom so blobs shrink relative to countries
    var g=octx.createRadialGradient(sx,sy,0,sx,sy,r);
    g.addColorStop(0,'rgba(255,255,255,'+(.82+pt.score*.18)+')');
    g.addColorStop(0.3,'rgba(255,255,255,'+(.5+pt.score*.2)+')');
    g.addColorStop(0.7,'rgba(255,255,255,0.12)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    octx.beginPath();
    octx.arc(sx,sy,r,0,Math.PI*2);
    octx.fillStyle=g;
    octx.fill();
  });

  // --- Pass 2: colorize the alpha map ---
  var idata=octx.getImageData(0,0,W,H);
  var data=idata.data;
  for(var i=0;i<data.length;i+=4){
    var a=data[i+3];
    if(a===0) continue;
    var t=a/255;
    var rgb=lerpColor(t);
    data[i]=rgb[0];
    data[i+1]=rgb[1];
    data[i+2]=rgb[2];
    data[i+3]=~~(a*0.9);
  }

  // --- Blur softly then draw ---
  ctx.clearRect(0,0,W,H);
  ctx.filter='blur('+Math.max(2, 7/k)+'px)'; // blur shrinks as you zoom in
  var tmp=document.createElement('canvas');
  tmp.width=W; tmp.height=H;
  tmp.getContext('2d').putImageData(idata,0,0);
  ctx.drawImage(tmp,0,0);
  ctx.filter='none';
}

/* ═══════════════════════════════════════════════
   COUNTRY LABELS (SVG, shown for hot countries)
═══════════════════════════════════════════════ */
function renderLabels(pts){
  if(!S.labelG) return;
  S.labelG.selectAll('*').remove();

  // Sort hottest first so important labels win collisions
  var sorted=pts.slice().sort(function(a,b){return b.score-a.score;});

  // Collision boxes for placed labels [x0,y0,x1,y1]
  var placed=[];
  var PAD=4; // padding around each label box

  function overlaps(box){
    for(var i=0;i<placed.length;i++){
      var b=placed[i];
      if(box[0]<b[2]+PAD && box[2]>b[0]-PAD && box[1]<b[3]+PAD && box[3]>b[1]-PAD) return true;
    }
    return false;
  }

  var k=S.zoomK||1, tx=S.zoomX||0, ty=S.zoomY||0;

  sorted.forEach(function(pt){
    var raw=S.proj([pt.lng,pt.lat]);
    if(!raw||!isFinite(raw[0])) return;
    // Apply zoom to get screen position
    var px=[raw[0]*k+tx, raw[1]*k+ty];

    var hot=pt.score>.55;
    var mid=pt.score>.2;
    var dotR=hot?4.5:mid?3.5:2.5;
    var dotColor=hot?'#ff3300':mid?'#ff8800':'#ffbb00';
    var ringColor=hot?'#ff3300':'#ff8800';

    // Pulse ring — only for notable spots
    if(mid){
      S.labelG.append('circle')
        .attr('cx',px[0]).attr('cy',px[1]).attr('r',dotR)
        .attr('fill','none')
        .attr('stroke',ringColor)
        .attr('stroke-width',1.5)
        .attr('opacity',.6)
        .append('animate')
          .attr('attributeName','r')
          .attr('values',dotR+';'+(dotR+6)+';'+dotR)
          .attr('dur','2.2s').attr('repeatCount','indefinite');
    }

    // Solid dot — always shown for any hotspot
    S.labelG.append('circle')
      .attr('cx',px[0]).attr('cy',px[1]).attr('r',dotR)
      .attr('fill',dotColor)
      .attr('opacity',.95);

    // Label — only if it doesn't collide with an already-placed label
    var shortName=pt.name
      .replace('United States','US')
      .replace('United Kingdom','UK')
      .replace('United Arab Emirates','UAE')
      .replace('North Korea','N.Korea')
      .replace('South Korea','S.Korea')
      .replace('South Africa','S.Africa')
      .replace('Saudi Arabia','S.Arabia')
      .replace('New Zealand','N.Zealand');

    var fontSize=hot?11:10;
    var charW=fontSize*0.6; // approximate char width
    var labelW=shortName.length*charW;
    var labelH=fontSize+2;
    var lx=px[0]-labelW/2, ly=px[1]-dotR-labelH-3;
    var box=[lx, ly, lx+labelW, ly+labelH];

    if(!overlaps(box)){
      placed.push(box);

      // Outline (drawn behind for contrast)
      S.labelG.append('text')
        .attr('x',px[0]).attr('y',px[1]-dotR-5)
        .attr('text-anchor','middle')
        .attr('dominant-baseline','auto')
        .attr('font-size',fontSize)
        .attr('font-weight','700')
        .attr('font-family','Segoe UI,system-ui,sans-serif')
        .attr('fill','none')
        .attr('stroke','rgba(0,0,0,0.9)')
        .attr('stroke-width','3')
        .attr('stroke-linejoin','round')
        .text(shortName);

      // Foreground text
      S.labelG.append('text')
        .attr('x',px[0]).attr('y',px[1]-dotR-5)
        .attr('text-anchor','middle')
        .attr('dominant-baseline','auto')
        .attr('font-size',fontSize)
        .attr('font-weight','700')
        .attr('font-family','Segoe UI,system-ui,sans-serif')
        .attr('fill',hot?'#ffffff':'#ffe8a0')
        .attr('opacity','1')
        .text(shortName);
    }
  });
}

function updateTicker(articles){
  var inner=document.getElementById('t-inner');
  var items=articles.slice(0,60);
  if(!items.length){
    inner.innerHTML='<span class="ti">Could not load headlines — retrying…</span>';
    return;
  }
  var html=items.map(function(a){
    var link=escAttr(a.link);
    return '<span class="ti" onclick="window.open(\''+link+'\',\'_blank\')">'
      +'<span class="ti-src">'+esc(a.source)+'</span>'
      +esc(trunc(a.title,85))
      +'</span><span class="tdot"></span>';
  }).join('');

  inner.style.animation='none';
  inner.innerHTML=html+html;

  requestAnimationFrame(function(){requestAnimationFrame(function(){
    var half=inner.scrollWidth/2;
    var dur=half/80;
    document.getElementById('ts').textContent=
      '@keyframes ts{0%{transform:translateX(0)}100%{transform:translateX(-'+half+'px)}}';
    inner.style.animation='ts '+dur+'s linear infinite';
  });});
}

function startCountdown(){
  S.countdown=REFRESH;
  var arc=document.getElementById('refresh-arc');
  var circumference=2*Math.PI*7; // r=7
  arc.setAttribute('stroke-dasharray',circumference);

  clearInterval(S.refreshTimer);
  S.refreshTimer=setInterval(function(){
    S.countdown--;
    var progress=1-(S.countdown/REFRESH);
    arc.setAttribute('stroke-dashoffset',circumference*(1-progress));
    if(S.countdown<=0) clearInterval(S.refreshTimer);
  },1000);
}

/* ═══════════════════════════════════════════════
   UPDATE CYCLE
═══════════════════════════════════════════════ */
var cycling=false;
function cycle(){
  if(cycling) return;
  cycling=true;

  // Fade canvas slightly to signal refresh
  S.canvas.classList.add('fading');

  fetchAll().then(function(articles){
    S.articles=articles;
    var raw=extract(articles);

    // Save prev counts for trend
    var newPrev={};
    S.heatPts.forEach(function(p){newPrev[p.name]=p.count;});
    S.prevCounts=newPrev;

    S.heatPts=normalize(raw);

    S.canvas.classList.remove('fading');
    renderHeat(S.heatPts);
    renderLabels(S.heatPts);
    updateTicker(articles);
    setStatus(articles.length,new Date());
    buildIssues(S.filteredArticles||articles);
    buildConflictList(S.filteredArticles||articles);
    renderUKPoi();

    // Refresh open panel if still open
    if(S.openCountry&&S.byCountry[S.openCountry]){
      openPanel(S.openCountry);
    }
  }).catch(function(e){
    console.error('cycle',e);
    S.canvas.classList.remove('fading');
  }).finally(function(){
    cycling=false;
    startCountdown();
    setTimeout(cycle,REFRESH*1000);
  });
}

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s){
  return String(s||'').replace(/'/g,'%27').replace(/"/g,'%22');
}
function trunc(s,n){return s.length>n?s.slice(0,n-1)+'…':s;}
function debounce(fn,ms){var t;return function(){clearTimeout(t);t=setTimeout(fn,ms);};}
function timeAgo(date){
  var s=Math.floor((Date.now()-date)/1000);
  if(s<60) return s+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function buildIssues(articles){
  var body = document.getElementById('issues-body');
  if(!articles || !articles.length){
    body.innerHTML='<div style="padding:16px;font-size:11px;color:#2d4560;font-style:italic">No articles loaded yet.</div>';
    return;
  }

  var results = ISSUE_DEFS.map(function(def){
    var matched = articles.filter(function(a){
      return def.re.test(a.title+' '+(a.desc||''));
    });
    // collect countries involved
    var countries = {};
    matched.forEach(function(a){
      var txt = (a.title+' '+(a.desc||'')).toLowerCase();
      KW.forEach(function(kw){
        if(mkre(kw).test(txt)) countries[C[kw].name]=1;
      });
    });
    return {
      def: def,
      count: matched.length,
      articles: matched.slice(0,8),
      countries: Object.keys(countries).slice(0,6),
    };
  }).filter(function(r){ return r.count > 0; })
    .sort(function(a,b){ return b.count - a.count; });

  if(!results.length){
    body.innerHTML='<div style="padding:16px;font-size:11px;color:#2d4560;font-style:italic">No issues detected in current cycle.</div>';
    return;
  }


  body.innerHTML = results.map(function(r){
    var d=r.def;
    var clist = r.countries.length
      ? r.countries.map(function(c){return '<span style="color:#6688aa">'+esc(c)+'</span>';}).join(' · ')
      : '<span style="color:#2d4560">global</span>';
    var arts = r.articles.map(function(a){
      return '<div style="padding:4px 0;font-size:10px;color:#557799;border-top:1px solid rgba(255,255,255,.03);cursor:pointer" onclick="window.open(\''+escAttr(a.link)+'\',\'_blank\')">'
        +'<span style="color:#ff7733;font-size:9px;font-weight:700;margin-right:4px">'+esc(a.source)+'</span>'
        +esc(trunc(a.title,72))
        +'</div>';
    }).join('');
    return '<div class="issue-item">'
      +'<span class="issue-tag '+d.tag+'">'+d.tag.toUpperCase()+'</span>'
      +'<div class="issue-name"><span class="issue-dot" style="background:'+d.color+'"></span>'+esc(d.name)+'</div>'
      +'<div class="issue-count">'+r.count+' article'+(r.count!==1?'s':'')+' this cycle</div>'
      +'<div class="issue-countries">'+clist+'</div>'
      +'<div style="padding-top:4px">'+arts+'</div>'
      +'</div>';
  }).join('');
}

/* ═══════════════════════════════════════════════
   MARKETS BAR
   Uses Yahoo Finance v8 chart endpoint via corsproxy.io.
   Fetches each symbol independently in parallel.
═══════════════════════════════════════════════ */
var TICKERS = [
  {sym:'SPX',   yf:'^GSPC',   label:'S&P 500'},
  {sym:'NDX',   yf:'^IXIC',   label:'NASDAQ'},
  {sym:'DJI',   yf:'^DJI',    label:'Dow Jones'},
  {sym:'VIX',   yf:'^VIX',    label:'VIX'},
  {sym:'WTI',   yf:'CL=F',    label:'Oil WTI'},
  {sym:'XAU',   yf:'GC=F',    label:'Gold'},
  {sym:'BTC',   yf:'BTC-USD', label:'BTC'},
  {sym:'EUR',   yf:'EURUSD=X',label:'EUR/USD'},
  {sym:'DXY',   yf:'DX-Y.NYB',label:'DXY'},
  {sym:'TNX',   yf:'^TNX',    label:'10Y Yield'},
];

var MKT_REFRESH = 5 * 60 * 1000; // 5 min

function fmtPrice(p, sym) {
  if (p == null || isNaN(p)) return '—';
  if (sym === 'BTC') return '$' + p.toLocaleString('en-US', {maximumFractionDigits:0});
  if (sym === 'EUR') return p.toFixed(4);
  if (sym === 'DXY' || sym === 'TNX' || sym === 'VIX') return p.toFixed(2);
  if (p >= 1000) return p.toLocaleString('en-US', {maximumFractionDigits:2});
  return p.toFixed(2);
}

function fmtChg(chg, pct) {
  if (chg == null || isNaN(chg)) return '—';
  var sign = chg >= 0 ? '+' : '';
  return sign + pct.toFixed(2) + '%';
}

function fetchOneTicker(t) {
  var url = 'https://query1.finance.yahoo.com/v8/finance/chart/' +
    encodeURIComponent(t.yf) + '?interval=1d&range=1d';
  var proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);
  return fetch(proxy, {cache:'no-store'})
    .then(function(r){ return r.json(); })
    .then(function(d){
      var meta = d.chart && d.chart.result && d.chart.result[0] && d.chart.result[0].meta;
      if (!meta) return {yf: t.yf, price: null, chg: null, pct: null};
      var price = meta.regularMarketPrice;
      var prev  = meta.chartPreviousClose || meta.previousClose || price;
      var chg   = price - prev;
      var pct   = prev ? (chg / prev) * 100 : 0;
      return {yf: t.yf, price: price, chg: chg, pct: pct};
    })
    .catch(function(){ return {yf: t.yf, price: null, chg: null, pct: null}; });
}

function fetchMarkets() {
  Promise.allSettled(TICKERS.map(fetchOneTicker))
    .then(function(results){
      var data = results.map(function(r){ return r.status === 'fulfilled' ? r.value : null; });
      renderMarkets(data);
    });
}

function renderMarkets(results) {
  var bar = document.getElementById('markets');
  var loading = document.getElementById('mkt-loading');
  if (loading) loading.remove();

  var old = bar.querySelectorAll('.mkt');
  old.forEach(function(el){ el.remove(); });

  var updEl = document.getElementById('mkt-updated');

  TICKERS.forEach(function(t, i){
    var r = results[i];
    var price = r ? r.price : null;
    var chg   = r ? r.chg   : null;
    var pct   = r ? r.pct   : null;

    var chgClass = 'flat';
    if (chg != null) chgClass = chg > 0 ? 'up' : chg < 0 ? 'dn' : 'flat';

    var div = document.createElement('div');
    div.className = 'mkt';
    div.title = t.label;
    div.innerHTML =
      '<span class="mkt-sym">' + t.sym + '</span>' +
      '<span class="mkt-price">' + fmtPrice(price, t.sym) + '</span>' +
      '<span class="mkt-chg ' + chgClass + '">' + fmtChg(chg, pct) + '</span>';

    bar.insertBefore(div, updEl);
  });

  updEl.textContent = 'mkt ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  setTimeout(fetchMarkets, MKT_REFRESH);
}

/* ═══════════════════════════════════════════════
   DOOMSDAY CLOCK
   Current setting: 89 seconds to midnight (Jan 2025).
   The clock shows 11:58:31 — i.e. 89s before midnight.
   The second hand ticks in real time; minute/hour hands
   are fixed at the official setting position.
═══════════════════════════════════════════════ */
(function initDoomClock(){
  // Official setting: 89 seconds to midnight
  // = 11h 58m 31s  (midnight = 12:00:00)
  var SECS_TO_MIDNIGHT = 89;

  // Build tick marks
  var ticksG  = document.getElementById('doom-ticks');
  var minsG   = document.getElementById('doom-mins');
  var cx = 48, cy = 48, R = 40;

  for(var i = 0; i < 60; i++){
    var ang = (i / 60) * 2 * Math.PI - Math.PI/2;
    var isMaj = (i % 5 === 0);
    var r1 = isMaj ? R - 6 : R - 3;
    var x1 = cx + R * Math.cos(ang), y1 = cy + R * Math.sin(ang);
    var x2 = cx + r1 * Math.cos(ang), y2 = cy + r1 * Math.sin(ang);
    var line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    (isMaj ? minsG : ticksG).appendChild(line);
  }

  // Danger arc: from -90s to midnight (11:58:30 → 12:00:00)
  // Angle range: the arc from 11:58:30 to 12:00 on the clock face
  // 12:00:00 = top = -π/2 rad
  // 11:58:30 = 90 seconds before midnight
  // Each second on the minute ring = 360/3600 degrees = 0.1 deg
  // 90 seconds = 9 degrees before 12
  function arcPath(cx, cy, r, startDeg, endDeg){
    var s = (startDeg - 90) * Math.PI / 180;
    var e = (endDeg   - 90) * Math.PI / 180;
    var x1 = cx + r*Math.cos(s), y1 = cy + r*Math.sin(s);
    var x2 = cx + r*Math.cos(e), y2 = cy + r*Math.sin(e);
    var large = (endDeg - startDeg) > 180 ? 1 : 0;
    return 'M '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2;
  }
  // Arc from -9deg to 0deg (11:58:30 to 12:00)
  document.getElementById('doom-arc').setAttribute('d',
    arcPath(cx, cy, R-1, 360-9, 360));

  // Fixed hand angles for 11:58:31
  // Hour hand: 11h 58m 31s
  //   = (11 + 58/60 + 31/3600) / 12 * 360 = 359.14°
  var totalSecs = (12 * 3600) - SECS_TO_MIDNIGHT; // 43111 secs from midnight back
  var hourDeg  = (totalSecs / 43200) * 360;    // 43200 = 12h in seconds
  var minuteDeg = ((totalSecs % 3600) / 3600) * 360;

  function setHand(id, deg){
    var el = document.getElementById(id);
    var rad = (deg - 90) * Math.PI / 180;
    // hand drawn from center upward; rotate via transform
    el.setAttribute('transform','rotate('+deg+',48,48)');
  }
  setHand('doom-hour', hourDeg);
  setHand('doom-minute', minuteDeg);

  // Second hand ticks live — adds real drama
  function tickSecond(){
    var now = new Date();
    var s = now.getSeconds() + now.getMilliseconds()/1000;
    // Map real seconds to the "last 89 seconds" zone
    // We want the second hand to count down from 89 to 0 looping
    var secondsLeft = SECS_TO_MIDNIGHT - (s % SECS_TO_MIDNIGHT);
    // Angle: place at 89s-before-midnight position, ticking toward midnight
    var secAngle = ((43200 - secondsLeft) / 43200) * 360;
    document.getElementById('doom-second').setAttribute('transform','rotate('+secAngle+',48,48)');
    requestAnimationFrame(tickSecond);
  }
  tickSecond();
})();

// Live-detected conflicts (populated from articles each cycle)
var S_conflicts = {
  seed: CONFLICT_SEED,
  live: [],       // auto-detected new conflicts
  all: [],        // merged seed + live, sorted by article heat
  active: null,   // currently selected conflict id
};

/* ── Detection: find new conflict pairs from article co-occurrence ── */
var CONFLICT_TRIGGER = /\b(war|invasion|troops|military attack|airstrike|offensive|killed|ceasefire|fighting|battle|conflict|rebel|insurgent|coup|bombing|casualties)\b/i;

function detectLiveConflicts(articles){
  // For each article that mentions conflict keywords, collect which countries appear
  var pairCounts = {};
  articles.forEach(function(a){
    var txt = (a.title+' '+(a.desc||'')).toLowerCase();
    if(!CONFLICT_TRIGGER.test(txt)) return;
    // Which countries appear in this article?
    var found = [];
    KW.forEach(function(kw){
      if(mkre(kw).test(txt)){
        var n = C[kw].name;
        if(found.indexOf(n)<0) found.push(n);
      }
    });
    // Register pairs
    for(var i=0;i<found.length;i++){
      for(var j=i+1;j<found.length;j++){
        var pair = [found[i],found[j]].sort().join(':::');
        pairCounts[pair] = (pairCounts[pair]||0)+1;
      }
    }
  });

  // Any pair with 3+ co-occurrences becomes a live conflict
  var newLive = [];
  Object.keys(pairCounts).forEach(function(pair){
    if(pairCounts[pair] < 3) return;
    var parts = pair.split(':::');
    var c1 = parts[0], c2 = parts[1];
    // Skip if already covered by seed
    var covered = S_conflicts.seed.some(function(s){
      return s.countries.indexOf(c1)>=0 && s.countries.indexOf(c2)>=0;
    });
    if(covered) return;
    // Skip if same country twice (shouldn't happen but guard)
    if(c1 === c2) return;
    var existingId = 'live:'+pair;
    var existing = S_conflicts.live.find(function(l){ return l.id===existingId; });
    if(existing){
      existing.heat = pairCounts[pair];
      existing.isNew = false;
    } else {
      newLive.push({
        id: existingId,
        name: c1+' – '+c2,
        status: 'tension',
        countries: parts,
        center: midpoint(C[KW.find(function(k){return C[k].name===c1;})], C[KW.find(function(k){return C[k].name===c2;})]),
        zoom: 3,
        started: 'Emerging',
        history: 'This conflict pair was automatically detected from live news coverage. ' +
          pairCounts[pair]+' articles in the current cycle mention both '+c1+' and '+c2+
          ' alongside conflict-related keywords. Click live headlines below for sources.',
        detect: null,
        heat: pairCounts[pair],
        isNew: true,
      });
    }
  });

  // Merge new into live list
  newLive.forEach(function(n){ S_conflicts.live.push(n); });
  // Remove stale live entries (no longer appearing)
  S_conflicts.live = S_conflicts.live.filter(function(l){
    var pair = l.countries.slice().sort().join(':::');
    return (pairCounts[pair]||0) >= 3;
  });
}

function midpoint(c1, c2){
  if(!c1||!c2) return {lat:20,lng:0};
  return {lat:(c1.lat+c2.lat)/2, lng:(c1.lng+c2.lng)/2};
}

/* ── Build merged conflict list with article heat scores ── */
function buildConflictList(articles){
  detectLiveConflicts(articles);

  // Score each seed conflict by article matches
  var scored = S_conflicts.seed.map(function(cf){
    var matched = cf.detect ? articles.filter(function(a){
      return cf.detect.test(a.title+' '+(a.desc||''));
    }) : [];
    return Object.assign({}, cf, {heat: matched.length, articles: matched.slice(0,12), isNew: false});
  });

  // Merge with live
  var live = S_conflicts.live.map(function(lv){
    var matched = articles.filter(function(a){
      var txt = (a.title+' '+(a.desc||'')).toLowerCase();
      return lv.countries.every(function(c){
        var kws = KW.filter(function(k){ return C[k].name===c; });
        return kws.some(function(k){ return mkre(k).test(txt); });
      }) && CONFLICT_TRIGGER.test(txt);
    });
    return Object.assign({}, lv, {articles: matched.slice(0,8)});
  });

  S_conflicts.all = scored.concat(live).sort(function(a,b){ return b.heat-a.heat; });
  renderConflictDropdown();
}

/* ── Render the dropdown list ── */
function renderConflictDropdown(){
  var dd = document.getElementById('conflicts-dropdown');
  if(!S_conflicts.all.length){
    dd.innerHTML='<div style="padding:12px 14px;font-size:11px;color:#334455;font-style:italic">No conflicts detected yet.</div>';
    return;
  }
  dd.innerHTML = S_conflicts.all.map(function(cf){
    var dotColor = cf.status==='active' ? '#ff3333' : cf.status==='tension' ? '#ffaa33' : '#44aaff';
    var heatBar = cf.heat > 0 ? Math.min(cf.heat, 20) : 0;
    return '<div class="cf-item" onclick="openConflictPanel(\''+cf.id+'\')">'
      +'<div class="cf-dot" style="background:'+dotColor+'"></div>'
      +'<div class="cf-name">'+esc(cf.name)+(cf.isNew?'<span class="cf-new">NEW</span>':'')+'</div>'
      +(cf.heat>0?'<div class="cf-heat">'+cf.heat+' art</div>':'')
      +'</div>';
  }).join('');
}

/* ── Open a conflict: zoom map, highlight countries, show panel ── */
window.openConflictPanel = function(id){
  var cf = S_conflicts.all.find(function(c){ return c.id===id; });
  if(!cf) return;
  S_conflicts.active = id;

  // Close dropdown
  document.getElementById('conflicts-dropdown').classList.remove('open');

  // Highlight countries on map
  highlightConflictCountries(cf.countries);

  // Zoom to conflict center
  zoomToConflict(cf);

  // Fill panel
  document.getElementById('cp-title').textContent = cf.name;

  var statusLabel = cf.status==='active'?'ACTIVE WAR':cf.status==='tension'?'HIGH TENSION':'FROZEN';
  var statusClass = cf.status;
  document.getElementById('cp-meta').innerHTML =
    '<span class="cp-badge '+statusClass+'">'+statusLabel+'</span>'
    +(cf.started?'<span class="cp-badge frozen" style="color:#7a9abb;border-color:rgba(120,160,200,.2)">Since '+esc(cf.started)+'</span>':'')
    +(cf.heat>0?'<span class="cp-badge tension" style="color:#ff9944">'+cf.heat+' live articles</span>':'');

  document.getElementById('cp-countries').innerHTML = cf.countries.map(function(c){
    return '<span class="cp-country-tag" onclick="zoomToCountry(\''+escAttr(c)+'\')" title="Click to zoom">'+esc(c)+'</span>';
  }).join('');

  document.getElementById('cp-history-text').textContent = cf.history || 'No background available.';

  // Live articles
  var arts = cf.articles || [];
  var artHtml = arts.length
    ? arts.map(function(a){
        return '<div class="cp-article" onclick="window.open(\''+escAttr(a.link)+'\',\'_blank\')">'
          +'<div class="cp-article-src">'+esc(a.source)+'</div>'
          +'<div class="cp-article-title">'+esc(trunc(a.title,90))+'</div>'
          +'<div class="cp-article-ago">'+timeAgo(a.date)+'</div>'
          +'</div>';
      }).join('')
    : '<div id="cp-live-empty">No live articles matched this cycle.</div>';
  document.getElementById('cp-live-articles').innerHTML = artHtml;

  document.getElementById('conflict-panel').classList.add('open');
  // Close other panels
  document.getElementById('panel').classList.remove('open');
};

window.closeConflictPanel = function(){
  document.getElementById('conflict-panel').classList.remove('open');
  clearConflictHighlight();
  S_conflicts.active = null;
};

/* ── Country highlighting on map for conflicts ── */
function highlightConflictCountries(countryNames){
  if(!S.mapG) return;
  var nameSet = {};
  countryNames.forEach(function(n){ nameSet[n]=1; });
  S.mapG.selectAll('path.cty').attr('fill', function(d){
    // Match by country name via our C table
    var match = KW.some(function(k){ return C[k].name && nameSet[C[k].name] && matchCountryPath(d, C[k].name); });
    return match ? 'rgba(255,60,60,0.55)' : '#182d48';
  }).attr('stroke', function(d){
    var match = KW.some(function(k){ return C[k].name && nameSet[C[k].name] && matchCountryPath(d, C[k].name); });
    return match ? 'rgba(255,80,80,0.9)' : 'none';
  }).attr('stroke-width', function(d){
    var match = KW.some(function(k){ return C[k].name && nameSet[C[k].name] && matchCountryPath(d, C[k].name); });
    return match ? 1.2 : 0;
  });
}

// Match a topojson path (by ISO numeric id) to a country name
var _nameToIso = null;
function buildNameToIso(){
  if(_nameToIso) return _nameToIso;
  _nameToIso = {};
  Object.keys(COUNTRY_ISO).forEach(function(n){ _nameToIso[n]=COUNTRY_ISO[n]; });
  return _nameToIso;
}
function matchCountryPath(d, name){
  var m = buildNameToIso();
  return m[name] && +d.id === m[name];
}

function clearConflictHighlight(){
  if(!S.mapG) return;
  // Re-apply alliance or default
  if(activeAlliance) applyAllianceHighlight(activeAlliance);
  else S.mapG.selectAll('path.cty').attr('fill','#182d48').attr('stroke','none').attr('stroke-width',0);
}

/* ── Zoom the map to a conflict's center ── */
function zoomToConflict(cf){
  if(!S.proj || !S.zoom || !S.svg) return;
  var px = S.proj([cf.center.lng, cf.center.lat]);
  if(!px || !isFinite(px[0])) return;
  var k = cf.zoom || 4;
  var tx = S.W/2 - px[0]*k;
  var ty = S.H/2 - px[1]*k;
  S.svg.transition().duration(700)
    .call(S.zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(k));
}

/* ── Zoom to a single country (from country tag click) ── */
window.zoomToCountry = function(name){
  var kw = KW.find(function(k){ return C[k].name===name; });
  if(!kw) return;
  var coord = C[kw];
  var px = S.proj([coord.lng, coord.lat]);
  if(!px||!isFinite(px[0])) return;
  var k = 5;
  var tx = S.W/2 - px[0]*k;
  var ty = S.H/2 - px[1]*k;
  S.svg.transition().duration(600)
    .call(S.zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(k));
};

/* ── Dropdown toggle ── */
window.toggleConflictsDropdown = function(){
  var dd = document.getElementById('conflicts-dropdown');
  dd.classList.toggle('open');
};

// Close dropdown when clicking outside
document.addEventListener('click', function(e){
  if(!document.getElementById('conflicts-wrap').contains(e.target)){
    document.getElementById('conflicts-dropdown').classList.remove('open');
  }
});
